<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RA BAU LIEFERUNG | Schweizer Materiallieferung</title>
    
  
    
    
    <script>
      // Suppress benign fetch getter errors caused by browser extensions or dev environments
      window.addEventListener('error', function(event) {
        const msg = event.message || (event.error && event.error.message) || '';
        if (msg.includes('Cannot set property fetch') && msg.includes('getter')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        const msg = (event.reason && event.reason.message) || '';
        if (msg.includes('Cannot set property fetch') && msg.includes('getter')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
