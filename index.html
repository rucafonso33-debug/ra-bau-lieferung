<html lang="de-CH">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="RA Bau Lieferung: Baustellenzubehör, Feinsteinzeug, Premium Mosaike, SPC/Vinylböden sowie Bad- und Sanitärprodukte für projektbezogene Lieferungen in der Schweiz." />
    <title>RA Bau Lieferung | Bau- und Renovationsmaterial Schweiz</title>
    <script>
      window.addEventListener('error', function(event) {
        const msg = event.message || (event.error && event.error.message) || '';
        if (msg.includes('Cannot set property fetch') && msg.includes('getter')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        const msg = (event.reason && event.reason.message) || '';
        if (msg.includes('Cannot set property fetch') && msg.includes('getter')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
