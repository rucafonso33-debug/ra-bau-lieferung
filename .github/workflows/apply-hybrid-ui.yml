name: Apply controlled hybrid UI

on:
  push:
    branches:
      - codex/hybrid-best-version-20260724
    paths:
      - scripts/apply-hybrid-ui.mjs
      - .github/workflows/apply-hybrid-ui.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/hybrid-best-version-20260724
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-hybrid-ui.mjs
      - name: Commit controlled UI update
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Restore premium cards, logo and mobile-safe header"
          git push origin HEAD:codex/hybrid-best-version-20260724
