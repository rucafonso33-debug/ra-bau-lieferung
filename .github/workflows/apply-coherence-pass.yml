name: Apply coherence pass

on:
  push:
    branches:
      - codex/hybrid-best-version-20260724
    paths:
      - scripts/apply-coherence-pass.mjs
      - .github/workflows/apply-coherence-pass.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/hybrid-best-version-20260724
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-coherence-pass.mjs
      - name: Commit coherence update
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/finalData.ts src/storefrontConfig.ts src/types.ts scripts/generate-static-routes.mjs
          git commit -m "Align products, imagery, routes and storefront copy"
          git push origin HEAD:codex/hybrid-best-version-20260724
